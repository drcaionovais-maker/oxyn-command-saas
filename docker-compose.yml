services:
  api:
    build: .
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: oxyn
      POSTGRES_USER: oxyn
      POSTGRES_PASSWORD: oxyn
    ports:
      - "5432:5432"
    volumes:
      - oxyn_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oxyn -d oxyn"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  oxyn_pgdata:
